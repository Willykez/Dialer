name: Android CI & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  pull_request:
    branches:
      - main

  workflow_dispatch:


permissions:
  contents: write


concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true


jobs:

  debug-build:
    name: Debug CI Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4


      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Restore debug keystore
        run: base64 -d debug.keystore.base64 > debug.keystore


      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon


      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon


      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon


      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Dialer-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk



  release-build:
    name: Signed Release APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v4


      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle


      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Generate signing keystore
        id: keystore
        shell: bash
        run: |

          PASSWORD=$(openssl rand -hex 16)

          KEYSTORE="$RUNNER_TEMP/dialer-release.keystore"

          keytool -genkeypair \
            -storetype PKCS12 \
            -keystore "$KEYSTORE" \
            -alias dialer \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$PASSWORD" \
            -keypass "$PASSWORD" \
            -dname "CN=Dialer, OU=Android, O=Willykez, C=TZ"


          echo "::add-mask::$PASSWORD"

          echo "path=$KEYSTORE" >> $GITHUB_OUTPUT
          echo "password=$PASSWORD" >> $GITHUB_OUTPUT



      - name: Build Signed Release APK
        run: |

          ./gradlew assembleRelease \
          -PDIALER_RELEASE_STORE_FILE="${{ steps.keystore.outputs.path }}" \
          -PDIALER_RELEASE_STORE_PASSWORD="${{ steps.keystore.outputs.password }}" \
          -PDIALER_RELEASE_KEY_ALIAS="dialer" \
          -PDIALER_RELEASE_KEY_PASSWORD="${{ steps.keystore.outputs.password }}" \
          --no-daemon



      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Dialer-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30



      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:

          tag_name: ${{ github.ref_name }}

          name: Dialer Release ${{ github.ref_name }}

          files: app/build/outputs/apk/release/*.apk

          generate_release_notes: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
